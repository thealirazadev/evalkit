name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint, format, tests, build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run black --check .

      # The provider is mocked with httpx.MockTransport, so no API key is required.
      - name: Tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Entry point
        run: uv run evalkit --version
