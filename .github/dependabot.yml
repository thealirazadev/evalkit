version: 2

updates:
  # Python dependencies. pyproject.toml pins exact versions and uv.lock is committed,
  # so grouped monthly PRs keep the churn to one reviewable bump per ecosystem.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      runtime:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
